<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaPredica - Disease Prediction System</title>
    <style>
        /* ==== Global Styles ==== */
        body {
            font-family: Arial, sans-serif;
            background: #000; /* Black background */
            color: #fff;       /* White text */
            margin: 0;
            padding: 0;
        }
        h1, h2, h3 {
            margin: 0 0 15px 0;
        }
        a {
            color: #fff;
            text-decoration: none;
        }
        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            padding: 20px 0;
        }

        /* ==== Header ==== */
        header {
            text-align: center;
            padding: 40px 0;
        }
        .typing {
            width: 30ch;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid #fff;
            animation: typing 4s steps(30), blink 0.7s infinite;
            font-size: 1.5rem;
        }
        @keyframes typing {
            from { width: 0 }
            to { width: 30ch }
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* ==== Buttons ==== */
        .hover-btn {
            background: #fff;
            color: #000;
            padding: 12px 25px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin: 10px 0;
            transition: all 0.3s ease;
            border-radius: 5px;
        }
        .hover-btn:hover {
            background: #000;
            color: #fff;
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(255,255,255,0.3);
        }

        /* ==== Slide-in Sections ==== */
        .slide-in-left {
            transform: translateX(-100%);
            opacity: 0;
            animation: slideIn 1s forwards;
            animation-delay: 0.5s;
        }
        .slide-in-right {
            transform: translateX(100%);
            opacity: 0;
            animation: slideInRight 1s forwards;
            animation-delay: 0.5s;
        }
        @keyframes slideIn {
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideInRight {
            to { transform: translateX(0); opacity: 1; }
        }

        /* ==== Cards ==== */
        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .card {
            width: 200px;
            height: 120px;
            perspective: 1000px;
        }
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }
        .card:hover .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-weight: bold;
        }
        .card-front {
            background: #fff;
            color: #000;
        }
        .card-back {
            background: #000;
            color: #fff;
            transform: rotateY(180deg);
        }

        /* ==== Form Section ==== */
        .form-section {
            background: #111;
            padding: 30px;
            border-radius: 10px;
            margin-top: 50px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeIn 2s forwards;
        }
        .form-section input, .form-section select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            border-radius: 5px;
        }
        .form-section label {
            display: block;
            margin-top: 10px;
        }

        /* ==== Fade In ==== */
        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- ==== Header ==== -->
    <header>
        <h1>VitaPredica</h1>
        <h2 class="typing">Predicting Your Health, One Step at a Time...</h2>
        <button class="hover-btn">Start Prediction</button>
    </header>

    <!-- ==== Info Cards ==== -->
    <div class="container">
        <h2 class="slide-in-left">How It Works</h2>
        <div class="cards">
            <div class="card">
                <div class="card-inner">
                    <div class="card-front">Symptoms</div>
                    <div class="card-back">Data Analysis</div>
                </div>
            </div>
            <div class="card">
                <div class="card-inner">
                    <div class="card-front">Prediction</div>
                    <div class="card-back">AI Model</div>
                </div>
            </div>
            <div class="card">
                <div class="card-inner">
                    <div class="card-front">Prevention</div>
                    <div class="card-back">Health Advice</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==== Form Section ==== -->
    <div class="form-section slide-in-right">
        <h2>Enter Your Details</h2>
        <form>
            <label for="age">Age</label>
            <input type="number" id="age" name="age" placeholder="Enter your age">

            <label for="sex">Sex</label>
            <select id="sex" name="sex">
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="custom">Custom</option>
            </select>

            <label for="symptoms">Symptoms</label>
            <input type="text" id="symptoms" name="symptoms" placeholder="Describe your symptoms">

            <button type="submit" class="hover-btn">Predict</button>
        </form>
    </div>

</body>
</html>
