<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        /* CSS Section */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0d0d;
            color: #e0e0e0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        .sidebar h2 {
            margin-bottom: 20px;
            color: #ffffff;
        }

        .new-chat-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.3s ease;
        }

        .new-chat-btn:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            background: rgba(50, 50, 50, 0.8);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .chat-item:hover {
            background: rgba(70, 70, 70, 0.8);
        }

        /* Main Chat Area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 15px;
            border-radius: 15px;
            position: relative;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.bot .message-content {
            background: rgba(50, 50, 50, 0.8);
            color: #e0e0e0;
        }

        .copy-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            padding: 5px;
            border-radius: 5px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .message:hover .copy-btn {
            opacity: 1;
        }

        .typing {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 15px;
            background: rgba(50, 50, 50, 0.8);
            border-radius: 15px;
            max-width: 70%;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area {
            display: flex;
            padding: 20px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-field {
            flex: 1;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(30, 30, 30, 0.8);
            color: #e0e0e0;
            resize: none;
            outline: none;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-left: 10px;
            transition: background 0.3s ease;
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .clear-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -300px;
                height: 100%;
                z-index: 10;
            }
            .sidebar.open {
                transform: translateX(300px);
            }
            .main {
                width: 100%;
            }
            .menu-toggle {
                display: block;
                position: absolute;
                top: 20px;
                left: 20px;
                background: rgba(30, 30, 30, 0.9);
                color: white;
                border: none;
                padding: 10px;
                border-radius: 10px;
                cursor: pointer;
                z-index: 11;
            }
        }

        .menu-toggle {
            display: none;
        }

        /* Smooth Animations */
        .chat-area {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <!-- HTML Section -->
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div class="sidebar" id="sidebar">
        <h2>Chat History</h2>
        <button class="new-chat-btn" onclick="newChat()">New Chat</button>
        <div class="chat-history" id="chatHistory"></div>
    </div>
    <div class="main">
        <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
        <div class="chat-area" id="chatArea"></div>
        <div class="input-area">
            <textarea class="input-field" id="inputField" placeholder="Type your message..." rows="1"></textarea>
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- JavaScript Section -->
    <script>
        // JS Variables
        const chatArea = document.getElementById('chatArea');
        const inputField = document.getElementById('inputField');
        const chatHistory = document.getElementById('chatHistory');
        const sidebar = document.getElementById('sidebar');
        let currentChatId = null;
        let chats = JSON.parse(localStorage.getItem('chats')) || {};
        let useRealAPI = false; // Set to true to use OpenAI API, paste your API key below
        const OPENAI_API_KEY = 'YOUR_OPENAI_API_KEY_HERE'; // Replace with your actual OpenAI API key

        // Load chat history on page load
        loadChatHistory();

        // Function to toggle sidebar on mobile
        function toggleSidebar() {
            sidebar.classList.toggle('open');
        }

        // Function to start a new chat
        function newChat() {
            currentChatId = Date.now().toString();
            chats[currentChatId] = [];
            saveChats();
            loadChat(currentChatId);
            updateChatHistory();
        }

        // Function to load a specific chat
        function loadChat(chatId) {
            currentChatId = chatId;
            chatArea.innerHTML = '';
            chats[chatId].forEach(msg => addMessage(msg.role, msg.content, false));
        }

        // Function to update chat history list
        function updateChatHistory() {
            chatHistory.innerHTML = '';
            Object.keys(chats).forEach(chatId => {
                const chatItem = document.createElement('div');
                chatItem.className = 'chat-item';
                chatItem.textContent = `Chat ${chatId}`;
                chatItem.onclick = () => loadChat(chatId);
                chatHistory.appendChild(chatItem);
            });
        }

        // Function to add a message to the chat
        function addMessage(role, content, save = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.textContent = '📋';
            copyBtn.onclick = () => navigator.clipboard.writeText(content);
            contentDiv.appendChild(copyBtn);
            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);
            if (save && currentChatId) {
                chats[currentChatId].push({ role, content });
                saveChats();
            }
            scrollToBottom();
        }

        // Function to show typing animation
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot typing';
            typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatArea.appendChild(typingDiv);
            scrollToBottom();
            return typingDiv;
        }

        // Function to hide typing animation
        function hideTyping(typingDiv) {
            if (typingDiv) chatArea.removeChild(typingDiv);
        }

        // Function to send message
        function sendMessage() {
            const message = inputField.value.trim();
            if (!message) return;
            if (!currentChatId) newChat();
            addMessage('user', message);
            inputField.value = '';
            const typingDiv = showTyping();
            setTimeout(() => {
                hideTyping(typingDiv);
                if (useRealAPI) {
                    fetchOpenAI(message);
                } else {
                    // Dummy response
                    const responses = [
                        "Hello! How can I assist you today?",
                        "That's an interesting question. Let me think...",
                        "I'm here to help with any queries you have.",
                        "Could you provide more details?"
                    ];
                    const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                    addMessage('bot', randomResponse);
                }
            }, 2000); // Simulate delay
        }

        // Function to fetch from OpenAI API
        async function fetchOpenAI(message) {
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENAI_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{ role: 'user', content: message }]
                    })
                });
                const data = await response.json();
                const botMessage = data.choices[0].message.content;
                addMessage('bot', botMessage);
            } catch (error) {
                addMessage('bot', 'Sorry, there was an error processing your request.');
                console.error(error);
            }
        }

        // Function to clear current chat
        function clearChat() {
            if (currentChatId) {
                chats[currentChatId] = [];
                saveChats();
                chatArea.innerHTML = '';
            }
        }

        // Function to save chats to localStorage
        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(chats));
        }

        // Function to load chat history
        function loadChatHistory() {
            updateChatHistory();
            if (Object.keys(chats).length > 0) {
                const lastChatId = Object.keys(chats)[Object.keys(chats).length - 1];
                loadChat(lastChatId);
            } else {
                newChat();
            }
        }

        // Function to scroll to bottom
        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Event listeners
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-resize textarea
        inputField.addEventListener('input', () => {
            inputField.style.height = 'auto';
            inputField.style.height = inputField.scrollHeight + 'px';
        });
    </script>
</body>
</html>
